    label: "Communication clarity"
    patterns: ["communication", "message", "clarity", "negotiation"]
    effect: opportunity
  - key: leadership_visibility
    label: "Leadership visibility"
    patterns: ["lead", "recognition", "visibility", "authority"]
    effect: opportunity
  - key: growth_expansion
    label: "Growth and expansion"
    patterns: ["growth", "expand", "opportunity", "promotion"]
    effect: opportunity
  - key: collaboration_quality
    label: "Collaboration quality"
    patterns: ["team", "collaboration", "partnership", "support"]
    effect: opportunity
  - key: pressure_overload
    label: "Execution pressure"
    patterns: ["delay", "pressure", "overload", "constraint", "friction"]
